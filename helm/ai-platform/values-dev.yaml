# KIND / local development overrides
global:
  env: development

api:
  replicas: 1
  image:
    repository: ai-platform
    tag: local
    pullPolicy: Never
  logLevel: debug
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: false
  pdb:
    enabled: false
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

postgresql:
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

qdrant:
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
