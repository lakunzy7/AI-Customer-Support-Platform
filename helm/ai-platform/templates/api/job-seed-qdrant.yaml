{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-seed-qdrant
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed-qdrant
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "ai-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed-qdrant
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Qdrant..."
              until nc -z {{ .Release.Name }}-qdrant 6333; do
                sleep 2
              done
              echo "Qdrant is ready."
      containers:
        - name: seed-qdrant
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - python
            - /app/src/scripts/seed_qdrant.py
          env:
            - name: QDRANT_HOST
              value: "{{ .Release.Name }}-qdrant"
            - name: QDRANT_PORT
              value: "6333"
{{- end }}
