# Production overrides
global:
  env: production

api:
  replicas: 3
  logLevel: warning
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPU: 65
    targetMemory: 75
  pdb:
    enabled: true
    minAvailable: 2
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/rate-limit: "50"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

postgresql:
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

qdrant:
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
