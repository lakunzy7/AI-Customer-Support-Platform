<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Customer Support</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-hover: #6b5ce7;
      --user-bubble: #1e1b4b;
      --assistant-bubble: #1a1a1a;
      --danger: #ef4444;
      --sidebar-w: 260px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #sidebar-header h2 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    #new-chat-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #new-chat-btn:hover { background: var(--accent-hover); }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background 0.15s;
      user-select: none;
    }
    .conv-item:hover { background: var(--surface2); color: var(--text); }
    .conv-item.active { background: var(--surface2); color: var(--text); }

    .conv-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conv-actions { display: none; gap: 4px; }
    .conv-item:hover .conv-actions,
    .conv-item.active .conv-actions { display: flex; }

    .conv-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .conv-action-btn:hover { color: var(--text); background: var(--border); }
    .conv-action-btn.danger:hover { color: var(--danger); }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #topbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    #hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    #topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      flex: 1;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.assistant .avatar { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 48px);
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubbles */
    .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; font-size: 1em; }
    .bubble p { margin: 6px 0; }
    .bubble ul, .bubble ol { margin: 6px 0 6px 20px; }
    .bubble li { margin: 3px 0; }
    .bubble code:not(pre code) {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
    }
    .bubble pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      position: relative;
    }
    .bubble pre code { font-size: 12px; font-family: 'Fira Code', 'Cascadia Code', monospace; }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .copy-btn:hover { color: var(--text); }

    .cached-badge {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      background: var(--surface);
    }

    #file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .file-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .file-chip button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .file-chip button:hover { color: var(--danger); }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #attach-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    #attach-btn:hover { color: var(--text); border-color: var(--text-muted); }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }

    #voice-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    #voice-btn:hover { color: var(--text); border-color: var(--text-muted); }
    #voice-btn.recording { color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
      flex-shrink: 0;
      height: 44px;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #file-input { display: none; }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 32px;
    }
    #empty-state .icon { font-size: 48px; }
    #empty-state h3 { font-size: 18px; color: var(--text); }
    #empty-state p { font-size: 14px; max-width: 360px; line-height: 1.6; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #hamburger { display: block; }
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 99;
      }
      #overlay.show { display: block; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="overlay"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Conversations</h2>
    <button id="new-chat-btn">+ New</button>
  </div>
  <div id="conv-list"></div>
</aside>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <button id="hamburger" aria-label="Toggle sidebar">&#9776;</button>
    <span id="topbar-title">AI Customer Support</span>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="icon">💬</div>
      <h3>How can I help you today?</h3>
      <p>Ask me anything about our products, services, or policies. You can also upload files for context.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="file-chips"></div>
    <div id="input-row">
      <button id="attach-btn" title="Attach file">📎</button>
      <input type="file" id="file-input" multiple
        accept=".txt,.md,.csv,.json,.xml,.yaml,.yml,.py,.js,.ts,.html,.css,.sql,.sh,.log,.pdf,.docx,.doc,.xlsx,.pptx,.odt,.ods,.rtf,.epub,.png,.jpg,.jpeg,.gif,.webp" />
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button id="voice-btn" title="Voice input">🎤</button>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let currentConvId = null;
  let uploadedFiles = []; // [{id, name}]
  let isRecording = false;
  let recognition = null;

  // ── DOM refs ──
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const convList = document.getElementById('conv-list');
  const fileInput = document.getElementById('file-input');
  const fileChips = document.getElementById('file-chips');
  const attachBtn = document.getElementById('attach-btn');
  const voiceBtn = document.getElementById('voice-btn');
  const topbarTitle = document.getElementById('topbar-title');
  const hamburger = document.getElementById('hamburger');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  // ── Sidebar toggle (mobile) ──
  hamburger.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  });

  // ── Auto-resize textarea ──
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ──
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Marked config ──
  marked.setOptions({ breaks: true, gfm: true });

  // ── Render a message bubble ──
  function renderMessage(role, content, cached = false) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant') {
      bubble.innerHTML = marked.parse(content);
      // Syntax highlight + copy buttons
      bubble.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
        const pre = block.parentElement;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(block.innerText);
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 2000);
        });
        pre.style.position = 'relative';
        pre.appendChild(btn);
      });
      if (cached) {
        const badge = document.createElement('div');
        badge.className = 'cached-badge';
        badge.textContent = '⚡ Cached response';
        bubble.appendChild(badge);
      }
    } else {
      bubble.textContent = content;
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  // ── Typing indicator ──
  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg assistant';
    msg.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Send message ──
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || sendBtn.disabled) return;

    sendBtn.disabled = true;
    msgInput.value = '';
    msgInput.style.height = 'auto';

    renderMessage('user', text);
    showTyping();

    const payload = {
      message: text,
      conversation_id: currentConvId || undefined,
      file_ids: uploadedFiles.map(f => f.id),
    };

    // Clear file chips after sending
    uploadedFiles = [];
    renderFileChips();

    try {
      const res = await fetch('/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      hideTyping();
      renderMessage('assistant', data.message, data.cached);

      if (!currentConvId) {
        currentConvId = data.conversation_id;
        // Refresh sidebar after a short delay (title may be generating)
        setTimeout(loadConversations, 1500);
      }
    } catch (err) {
      hideTyping();
      renderMessage('assistant', `⚠️ Error: ${err.message}. Please try again.`);
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  // ── Load conversations ──
  async function loadConversations() {
    try {
      const res = await fetch('/v1/conversations');
      if (!res.ok) return;
      const data = await res.json();
      const convs = data.conversations || [];
      convList.innerHTML = '';
      convs.forEach(c => {
        const item = document.createElement('div');
        item.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
        item.dataset.id = c.id;

        const title = document.createElement('span');
        title.className = 'conv-title';
        title.textContent = c.title || 'New conversation';

        const actions = document.createElement('div');
        actions.className = 'conv-actions';

        const renameBtn = document.createElement('button');
        renameBtn.className = 'conv-action-btn';
        renameBtn.title = 'Rename';
        renameBtn.textContent = '✏️';
        renameBtn.addEventListener('click', e => { e.stopPropagation(); renameConv(c.id, title); });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'conv-action-btn danger';
        deleteBtn.title = 'Delete';
        deleteBtn.textContent = '🗑️';
        deleteBtn.addEventListener('click', e => { e.stopPropagation(); deleteConv(c.id, item); });

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);
        item.appendChild(title);
        item.appendChild(actions);
        item.addEventListener('click', () => loadConversation(c.id, c.title));
        convList.appendChild(item);
      });
    } catch (_) {}
  }

  // ── Load a conversation's messages ──
  async function loadConversation(id, title) {
    currentConvId = id;
    topbarTitle.textContent = title || 'Conversation';
    messagesEl.innerHTML = '';
    emptyState.style.display = 'none';

    // Mark active
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });

    // Close sidebar on mobile
    sidebar.classList.remove('open');
    overlay.classList.remove('show');

    try {
      const res = await fetch(`/v1/conversations/${id}/messages`);
      if (!res.ok) return;
      const msgs = await res.json();
      msgs.forEach(m => renderMessage(m.role, m.content));
    } catch (_) {}
  }

  // ── New chat ──
  document.getElementById('new-chat-btn').addEventListener('click', () => {
    currentConvId = null;
    uploadedFiles = [];
    renderFileChips();
    messagesEl.innerHTML = '';
    emptyState.style.display = 'flex';
    topbarTitle.textContent = 'AI Customer Support';
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    msgInput.focus();
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  });

  // ── Rename conversation ──
  async function renameConv(id, titleEl) {
    const newTitle = prompt('Rename conversation:', titleEl.textContent);
    if (!newTitle || !newTitle.trim()) return;
    try {
      const res = await fetch(`/v1/conversations/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle.trim() }),
      });
      if (res.ok) {
        titleEl.textContent = newTitle.trim();
        if (id === currentConvId) topbarTitle.textContent = newTitle.trim();
      }
    } catch (_) {}
  }

  // ── Delete conversation ──
  async function deleteConv(id, itemEl) {
    if (!confirm('Delete this conversation?')) return;
    try {
      const res = await fetch(`/v1/conversations/${id}`, { method: 'DELETE' });
      if (res.ok) {
        itemEl.remove();
        if (id === currentConvId) {
          currentConvId = null;
          messagesEl.innerHTML = '';
          emptyState.style.display = 'flex';
          topbarTitle.textContent = 'AI Customer Support';
        }
      }
    } catch (_) {}
  }

  // ── File upload ──
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const files = Array.from(fileInput.files);
    fileInput.value = '';
    for (const file of files) {
      if (uploadedFiles.length >= 5) { alert('Maximum 5 files per message.'); break; }
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch('/v1/upload', { method: 'POST', body: formData });
        if (!res.ok) { alert(`Upload failed: ${file.name}`); continue; }
        const data = await res.json();
        uploadedFiles.push({ id: data.file_id, name: file.name });
        renderFileChips();
      } catch (_) { alert(`Upload error: ${file.name}`); }
    }
  });

  function renderFileChips() {
    fileChips.innerHTML = '';
    uploadedFiles.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `📄 ${f.name} <button title="Remove">&times;</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        uploadedFiles.splice(i, 1);
        renderFileChips();
      });
      fileChips.appendChild(chip);
    });
  }

  // ── Voice input ──
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = e => {
      msgInput.value += e.results[0][0].transcript;
      msgInput.dispatchEvent(new Event('input'));
    };
    recognition.onend = () => {
      isRecording = false;
      voiceBtn.classList.remove('recording');
    };

    voiceBtn.addEventListener('click', () => {
      if (isRecording) { recognition.stop(); }
      else { recognition.start(); isRecording = true; voiceBtn.classList.add('recording'); }
    });
  } else {
    voiceBtn.style.display = 'none';
  }

  // ── Init ──
  loadConversations();
  msgInput.focus();
</script>
</body>
</html>
