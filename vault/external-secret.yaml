apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: ai-platform
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: ai-platform
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-platform-secrets
  namespace: ai-platform
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ai-platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: openrouter-api-key
      remoteRef:
        key: ai-platform/openrouter
        property: api-key
